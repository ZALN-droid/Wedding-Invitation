<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>

/* ===== PAGE ===== */

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    position: relative;
    background: white;
}

/* ===== ENVELOPE HALVES ===== */

.panel {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 5;
    transition: transform 1.2s ease;
}

.left {
    left: 0;
    background-image: url("left.png");
}

.right {
    right: 0;
    background-image: url("right.png");
}

/* ===== WAX SEAL ===== */

.seal {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.4s ease;
}

/* ===== TAP TEXT ===== */

.tap-text {
    position: absolute;
    top: calc(50% + 100px);
    left: 50%;
    transform: translateX(-50%);
    font-family: Garamond, serif;
    font-size: 22px;
    color: black;
    letter-spacing: 1px;
    z-index: 10;
    transition: opacity 0.4s ease;
}

/* ===== OPEN ANIMATION ===== */

.open .left {
    transform: translateX(-100%);
}

.open .right {
    transform: translateX(100%);
}

.open .seal,
.open .tap-text {
    opacity: 0;
}

</style>
</head>

<body>

<!-- LEFT HALF -->
<div class="panel left"></div>

<!-- RIGHT HALF -->
<div class="panel right"></div>

<!-- WAX SEAL -->
<img
    src="seal.png"
    alt="Wax Seal"
    class="seal"
    onclick="openEnvelope()"
>

<!-- TEXT -->
<div class="tap-text">
    TAP TO OPEN
</div>

<script>

function openEnvelope() {

    document.body.classList.add("open");

    setTimeout(function () {

        window.location.href = "https://heyzine.com/flip-book/d974c4d591.html";

    }, 1400);

}

</script>

</body>
</html>
