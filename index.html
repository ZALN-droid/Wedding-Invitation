<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<style>

/* ===== BASE ===== */
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: white;
}

/* ===== ENVELOPE PANELS ===== */
.panel {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 1.2s ease;
}

.left {
    left: 0;
    background-image: url("left.png");
    box-shadow: 20px 0 25px rgba(0,0,0,0.25);
}

.right {
    right: 0;
    background-image: url("right.png");
    box-shadow: -20px 0 25px rgba(0,0,0,0.25);
}

/* ===== SEAL ===== */
.seal {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140px;
    transform: translate(-50%, -50%);
    z-index: 10;
    cursor: pointer;
}

/* ===== TAP TEXT ===== */
.tap-text {
    position: absolute;
    top: calc(50% + 90px);
    left: 50%;
    transform: translateX(-50%);
    font-family: Garamond, serif;
    font-size: 20px;
    color: black;
    z-index: 10;
}

/* ===== OPEN ANIMATION ===== */
.open .left {
    transform: translateX(-100%);
}

.open .right {
    transform: translateX(100%);
}

.open .seal,
.open .tap-text {
    opacity: 0;
    transition: opacity 0.4s ease;
}

/* ===== FLIPBOOK CONTAINER ===== */
#flipbook-container {
    position: absolute;
    inset: 0;
    display: none;
    z-index: 1;
}

</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="panel left"></div>
<div class="panel right"></div>

<img src="seal.png" class="seal" onclick="openEnvelope()">

<div class="tap-text">TAP TO OPEN</div>

<!-- FLIPBOOK EMBED -->
<div id="flipbook-container">
    <iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/d974c4d591.html" style="border: 1px solid lightgray; width: 100%; height: 400px;"></iframe>
</div>

<script>

function openEnvelope() {

    document.body.classList.add("open");

    setTimeout(() => {

        document.querySelector(".panel.left").style.display = "none";
        document.querySelector(".panel.right").style.display = "none";
        document.querySelector(".seal").style.display = "none";
        document.querySelector(".tap-text").style.display = "none";

        document.getElementById("flipbook-container").style.display = "block";

    }, 1200);

}

</script>

</body>
</html>
